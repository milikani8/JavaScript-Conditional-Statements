<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

  <body>
    <script>
      //Use the ternary operator to assign grades based on marks.

      let num = prompt("enter your marks:");
      let marks = Number(num);
      

let grade =
    marks >= 90 ? "A" :
    marks >= 80 ? "B" :
    marks >= 70 ? "C" :
    marks >= 60 ? "D" :
    "F";

console.log("Grade:", grade);
    </script>

      
  </body>
</html>

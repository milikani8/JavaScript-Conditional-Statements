<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Write a program to determine if a number is positive and even, positive and odd, or negative.
      
      let num = prompt("enter a number");
      let n = Number(num);

      if (n > 0) {
        if (n % 2 === 0) {
          console.log(n + " is positive and even.");
        } else {
          console.log(n + " is positive and odd.");
        }
      } else if (n < 0) {
        console.log(n + " is negative.");
      } else {
        console.log(n + " is zero.");
      }
    </script>

      
  </body>
</html>

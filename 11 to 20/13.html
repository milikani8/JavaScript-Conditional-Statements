  <body>
    <script>
      //Evaluate an expression using precedence of arithmetic operators and explain the output.

      let result = 10 + 5 * 2 - 8 / 4;

      console.log(result);

      //In this expression, the multiplication and division operators have higher precedence than addition and subtraction. So, the operations are performed in the following order:
      //1. 5 * 2 = 10
      //2. 8 / 4 = 2
      //3. 10 + 10 - 2 = 18
    </script>

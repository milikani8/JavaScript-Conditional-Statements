<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Check if a number is within range 100–200 or outside using && and ||.
      let num = prompt("enter a number");
      let n = Number(num);

      if (n >= 100 && n <= 200) {
        console.log(n + " is within the range 100–200.");
      } else {
        console.log(n + " is outside the range 100–200.");
      }
    </script>
  </body>
</html>

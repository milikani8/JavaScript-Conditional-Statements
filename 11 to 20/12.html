<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Use logical operators to check if a number is multiple of both 3 and 7.

      let num = prompt("enter a number");
      let n = Number(num);

      if (n % 3 === 0 && n % 7 === 0) {
        console.log(n + " is a multiple of both 3 and 7.");
      } else {
        console.log(n + " is not a multiple of both 3 and 7.");
      }
    </script>
  </body>
</html>

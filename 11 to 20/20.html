<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Use logical operators to verify if a number is not between 10 and 20.
      let num = prompt("enter a number");
      let n = Number(num);

      if (!(n > 10 && n < 20)) {
        console.log(n + " is not between 10 and 20.");
      } else {
        console.log(n + " is between 10 and 20.");
      }
    </script>
  </body>
</html>

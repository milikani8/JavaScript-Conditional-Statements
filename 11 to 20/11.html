  <body>
    <script>
      //Write a program to find the largest of three numbers using if–else ladder.
      let a = 10;
      let b = 20;
      let c = 30;

      if (a >= b && a >= c) {
        console.log("The largest number is:", a);
      } else if (b >= a && b >= c) {
        console.log("The largest number is:", b);
      } else {
        console.log("The largest number is:", c);
      }
    </script>
  </body>
</html>

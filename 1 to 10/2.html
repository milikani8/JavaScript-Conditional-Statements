  <body>
    <script>
      //Use the ternary operator to find the maximum of two numbers.
      let num1 = prompt("enter a number");
      let num2 = prompt("enter a number");

      let x = Number(num1);
      let y = Number(num2);

  let check=(x>y)? `${x} is greater than ${y}` : `${y} is greater than ${x}`;
  console.log(check);
    </script>

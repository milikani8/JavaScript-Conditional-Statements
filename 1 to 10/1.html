  <body>
    <script>
      //Write a program to check if a number is positive, negative, or zero using if–else.
      let num1 = prompt("enter a number");
      let num = Number(num1);
      if (num > 0) {
        console.log("number is positive");
    }
      else if (num<0){
        console.log("number is negative");
    }
      else{
        console.log("number is zero");
    }
    </script>
  </body>

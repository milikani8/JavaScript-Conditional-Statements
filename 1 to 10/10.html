<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Use the strict equality operator (===) to compare a number and a string.
      let num = 5;
      let str = "5";

      if (num === str) {
        console.log("The number and string are equal.");
      } else {
        console.log("The number and string are not equal.");
      }   

      
    </script>
  </body>
</html>

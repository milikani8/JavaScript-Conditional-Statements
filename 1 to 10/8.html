<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Use the assignment operators (+=, -=, *=, /=) to update a variable and print results.
      let x = 10;
      console.log("Initial value of x:", x);

      x += 5; // equivalent to x = x + 5
      console.log("After adding 5:", x);

      x -= 3; // equivalent to x = x - 3
      console.log("After subtracting 3:", x);

      x *= 2; // equivalent to x = x * 2
      console.log("After multiplying by 2:", x);

      x /= 4; // equivalent to x = x / 4
      console.log("After dividing by 4:", x);
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Create a grading system using else-if ladder: A, B, C, D, F based on score ranges.
      let score = prompt("Enter the score:");
      let s = Number(score);

      if (s >= 80) {
        console.log("Grade: A");
      } else if (s >= 60) {
        console.log("Grade: B");
      } else if (s >= 40) {
        console.log("Grade: C");
      } else if (s >= 20) {
        console.log("Grade: D");
      } else {
        console.log("Grade: F");
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Use logical operators to check if a number is prime or composite (without loops, assume small fixed values).

      let n = prompt("enter a number");
      let num = Number(n);

     if (num <= 1) {
    console.log(num + " is neither prime nor composite.");
}
else if (
    num === 2 || num === 3 || num === 5 || num === 7
) {
    console.log(num + " is a prime number.");
}
else if (
    num % 2 === 0 ||
    num % 3 === 0 ||
    num % 5 === 0 ||
    num % 7 === 0
) {
    console.log(num + " is a composite number.");
}
else {
    console.log(num + " is a prime number.");
}
    </script>
  </body>
</html>

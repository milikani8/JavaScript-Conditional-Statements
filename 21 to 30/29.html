<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Write a program to check if a number is within 1–100, 101–500, or above 500 using else-if ladder.


      let num = prompt("enter a number");
      let n = Number(num);

      if (n >= 1 && n <= 100) {
        console.log(n + " is within the range 1–100.");
      } else if (n >= 101 && n <= 500) {
        console.log(n + " is within the range 101–500.");
      } else {
        console.log(n + " is above 500.");
      }
    </script>
  </body>
</html>

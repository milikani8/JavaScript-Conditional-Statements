<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Use nested if–else to determine if a number is positive, negative, or zero, and also check if it’s even or odd.

      let num = prompt("enter a number");
      let n = Number(num);

      if (n > 0) {
        console.log(n + " is positive.");
        if (n % 2 === 0) {
          console.log(n + " is also even.");
        } else {
          console.log(n + " is also odd.");
        }
      } else if (n < 0) {
        console.log(n + " is negative.");
        if (n % 2 === 0) {
          console.log(n + " is also even.");
        } else {
          console.log(n + " is also odd.");
        }
      } else {
        console.log(n + " is zero.");
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Write a program to check if a number is multiple of 4 but not of 8.
      let num = prompt("enter a number");
      let n = Number(num);

      if ((n % 4) === 0 && (n % 8) !== 0) {
        console.log(n + " is a multiple of 4 but not of 8.");
      } else {
        console.log(n + " is not a multiple of 4 but not of 8.");
      }

      
    </script>
  </body>
</html>

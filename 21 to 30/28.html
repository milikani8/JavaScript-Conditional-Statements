<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Use nested if–else to determine if a number is divisible by both 2 and 5, only 2, only 5, or neither.

      let num = prompt("enter a number");
      let n = Number(num);

      if (n % 2 === 0) {
        if (n % 5 === 0) {
          console.log(n + " is divisible by both 2 and 5.");
        } else {
          console.log(n + " is divisible by 2 but not by 5.");
        }
      } else {
        if (n % 5 === 0) {
          console.log(n + " is divisible by 5 but not by 2.");
        } else {
          console.log(n + " is not divisible by either 2 or 5.");
        }
      }
    </script>
  </body>
</html>

    <script>
      //Use ! (NOT operator) to invert a boolean condition and explain the output.

      let isRainy = false;

console.log(!isRainy);
      //output is true because the NOT operator (!) inverts the value of isRainy. Since isRainy is false, !isRainy evaluates to true.

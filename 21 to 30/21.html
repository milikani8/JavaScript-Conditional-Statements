<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Write a program to check if three sides can form a triangle using relational operators.
      let side1 = prompt("Enter the first side:");
      let s1 = Number(side1);
      let side2 = prompt("Enter the second side:");
      let s2 = Number(side2);
      let side3 = prompt("Enter the third side:");
      let s3 = Number(side3);

      if (s1 + s2 > s3 && s2 + s3 > s1 && s3 + s1 > s2) {
        console.log("The three sides can form a triangle.");
      } else {
        console.log("The three sides cannot form a triangle.");
      }
    </script>
  </body>
</html>

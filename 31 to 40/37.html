    <script>
      //Write a program to check if a number is divisible by both 2 and 3, but not by 5.
      let num = prompt("Enter a number:");
      let n = Number(num);

      if (num % 2 === 0 && num % 3 === 0 && num % 5 !== 0) {
        console.log(num + " is divisible by both 2 and 3, but not by 5.");
      } else {
        console.log(num + " does not satisfy the condition.");
      }
    </script>

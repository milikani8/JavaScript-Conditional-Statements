<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Use logical operators to verify if (a > b && b > c) or (a < b && b < c) and print “ascending” or “descending”.

      let a = prompt("Enter the first number:");
      let b = prompt("Enter the second number:");
      let c = prompt("Enter the third number:");

      a = Number(a);
      b = Number(b);
      c = Number(c);

      if ((a > b && b > c) || (a < b && b < c)) {
        console.log("The numbers are in order.");
      } else {
        console.log("The numbers are not in order.");
      }
    </script>
  </body>
</html>

  <body>
    <script>
      //Write a program to check if a number is greater than 100, less than 0, or between 0 and 100, and print messages accordingly.
      
      let num = prompt("Enter a number:");
      let n = Number(num);

      if (num > 100) {
        console.log(num + " is greater than 100.");
      } else if (num < 0) {
        console.log(num + " is less than 0.");
      } else {
        console.log(num + " is between 0 and 100.");
      }
    </script>

    <script>
      //Use logical operators to validate if a number satisfies (num > 50 && num < 100) || (num > 200 && num < 300).
      let num = prompt("Enter a number:");
      let n = Number(num);

      if ((num > 50 && num < 100) || (num > 200 && num < 300)) {

        console.log(num + " does not satisfy the condition.");

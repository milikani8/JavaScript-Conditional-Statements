    <script>
      //Create a program that uses multiple operators to check if a number is within range, even, positive, and divisible by 3 — all in one conditional statement.

      let n = prompt("Enter a number:");
      let num = Number(n);

      if (num >= 1 && num <= 100 && num % 2 === 0 && num > 0 && num % 3 === 0) {
    console.log(num + " is within range, even, positive, and divisible by 3.");
} else {
    console.log(num + " does not satisfy all the conditions.");
}
